---
layout: default
---
<article>
  <header class="article-header">
    <p class="article-meta">{{ page.publication }}{% if page.date %} &middot; {{ page.date | date: "%B %Y" }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.dek %}<p class="dek">{{ page.dek }}</p>{% endif %}
  </header>
  <div class="article-body">
    {{ content }}
  </div>
</article>
